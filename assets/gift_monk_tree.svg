  <rect x="40" y="16" width="2" height="2" fill="#ffc0d0"/>
  <rect x="58" y="24" width="2" height="2" fill="#ffc0d0"/>
  <rect x="32" y="28" width="2" height="2" fill="#ffc0d0"/>
  <rect x="70" y="26" width="2" height="2" fill="#ffc0d0"/>

  <!-- ── Ствол ── -->
  <rect x="44" y="42" width="8" height="38" fill="#3a2818"/>
  <rect x="46" y="42" width="4" height="38" fill="#4a3220"/>
  <rect x="44" y="46" width="2" height="2"  fill="#2a1810"/>
  <rect x="50" y="52" width="2" height="2"  fill="#2a1810"/>
  <rect x="44" y="60" width="2" height="2"  fill="#2a1810"/>
  <rect x="50" y="68" width="2" height="2"  fill="#2a1810"/>

  <!-- Корни у основания -->
  <rect x="40" y="78" width="4" height="2" fill="#3a2818"/>
  <rect x="52" y="78" width="4" height="2" fill="#3a2818"/>
  <rect x="38" y="80" width="4" height="1" fill="#2a1810"/>
  <rect x="54" y="80" width="4" height="1" fill="#2a1810"/>

  <!-- ── Аура медитации ── -->
  <circle cx="48" cy="72" r="18" fill="url(#aura)"/>

  <!-- ── Монах (медитирует, бритая голова, красная роба) ── -->
  <!-- Голова -->
  <rect x="44" y="60" width="8" height="6" fill="#d4a070"/>
  <rect x="43" y="62" width="10" height="3" fill="#d4a070"/>
  <!-- Тень на голове -->
  <rect x="44" y="60" width="8" height="1" fill="#b47a50"/>
  <!-- Глаза закрыты -->
  <rect x="45" y="63" width="2" height="1" fill="#3a2818"/>
  <rect x="49" y="63" width="2" height="1" fill="#3a2818"/>
  <!-- Улыбка -->
  <rect x="46" y="65" width="4" height="1" fill="#8a4030"/>

  <!-- Шея -->
  <rect x="46" y="66" width="4" height="2" fill="#b47a50"/>

  <!-- Роба (широкие плечи, поза лотоса) -->
  <rect x="38" y="68" width="20" height="4" fill="#8a2a20"/>
  <rect x="36" y="70" width="24" height="4" fill="#8a2a20"/>
  <rect x="34" y="72" width="28" height="6" fill="#8a2a20"/>

  <!-- Светлая подкладка робы -->
  <rect x="38" y="68" width="20" height="1" fill="#c04030"/>
  <rect x="36" y="70" width="2"  height="4" fill="#6a1a10"/>
  <rect x="58" y="70" width="2"  height="4" fill="#6a1a10"/>

  <!-- Складки -->
  <rect x="42" y="72" width="1" height="4" fill="#6a1a10"/>
  <rect x="48" y="72" width="1" height="4" fill="#6a1a10"/>
  <rect x="54" y="72" width="1" height="4" fill="#6a1a10"/>

  <!-- Руки, сложенные на коленях -->
  <rect x="42" y="74" width="12" height="2" fill="#d4a070"/>
  <rect x="44" y="76" width="8"  height="1" fill="#b47a50"/>

  <!-- Пальцы сложены (мудра) -->
  <rect x="47" y="73" width="2" height="1" fill="#d4a070"/>

  <!-- ── Падающие лепестки ── -->
  <rect x="14" y="44" width="2" height="1" fill="#ff80a0"/>
  <rect x="14" y="45" width="1" height="1" fill="#c06080"/>

  <rect x="78" y="50" width="2" height="1" fill="#ffc0d0"/>
  <rect x="78" y="51" width="1" height="1" fill="#a04060"/>

  <rect x="24" y="58" width="2" height="1" fill="#ff80a0"/>
  <rect x="24" y="59" width="1" height="1" fill="#c06080"/>

  <rect x="72" y="62" width="2" height="1" fill="#ffc0d0"/>
  <rect x="72" y="63" width="1" height="1" fill="#a04060"/>

  <rect x="16" y="68" width="2" height="1" fill="#ff80a0"/>
  <rect x="16" y="69" width="1" height="1" fill="#c06080"/>

  <rect x="80" y="72" width="2" height="1" fill="#ffc0d0"/>

  <rect x="28" y="74" width="2" height="1" fill="#ff80a0"/>

  <!-- Лепестки на земле -->
  <rect x="20" y="82" width="2" height="1" fill="#a04060"/>
  <rect x="36" y="82" width="2" height="1" fill="#c06080"/>
  <rect x="62" y="82" width="2" height="1" fill="#a04060"/>
  <rect x="78" y="82" width="2" height="1" fill="#c06080"/>
  <rect x="10" y="84" width="2" height="1" fill="#a04060"/>
  <rect x="84" y="84" width="2" height="1" fill="#c06080"/>

  <!-- ── Маленький светлячок наблюдает ── -->
  <circle cx="68" cy="74" r="3" fill="#fff080" fill-opacity="0.4"/>
  <rect x="68" y="74" width="1" height="1" fill="#fffce8"/>

  <!-- ── Травинки ── -->
  <rect x="6"  y="78" width="1" height="2" fill="#3a5028"/>
  <rect x="14" y="78" width="1" height="2" fill="#4a6028"/>
  <rect x="26" y="78" width="1" height="2" fill="#3a5028"/>
  <rect x="70" y="78" width="1" height="2" fill="#4a6028"/>
  <rect x="82" y="78" width="1" height="2" fill="#3a5028"/>
  <rect x="90" y="78" width="1" height="2" fill="#4a6028"/>
</svg>
