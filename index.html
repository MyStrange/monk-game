<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Монах и лес</title>
<!-- PWA / iOS standalone -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Монах и лес">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0812">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<!-- Preload critical assets -->
<link rel="preload" as="image" href="assets/bg/main.png">
<link rel="preload" as="image" href="assets/sprites/hero_right.png">
<link rel="preload" as="image" href="assets/sprites/hero_left.png">
<link rel="preload" as="image" href="assets/sprites/hero_sit.png">
<link rel="preload" as="image" href="assets/sprites/cat.png">
<link rel="preload" as="image" href="assets/sprites/monk_red.png">
<link rel="preload" as="image" href="assets/bg/tree.png">
<link rel="preload" as="image" href="assets/bg/buddha.jpeg">
<link rel="preload" as="image" href="assets/bg/flyroom.jpeg">
<link rel="preload" as="image" href="assets/bg/above_main.jpeg">
</head>
<body>

<!-- Portrait rotate overlay (mobile only) -->
<div id="rotate-overlay">
  <canvas id="rotate-canvas"></canvas>
  <div class="rotate-content">
    <svg class="rotate-phone" width="48" height="72" viewBox="0 0 48 72" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
      <!-- outer body -->
      <rect x="2"  y="0"  width="44" height="72" fill="#1a120a"/>
      <rect x="4"  y="2"  width="40" height="68" fill="#231810"/>
      <!-- screen bezel -->
      <rect x="6"  y="8"  width="36" height="54" fill="#0e0a18"/>
      <!-- screen -->
      <rect x="8"  y="10" width="32" height="50" fill="#06040e"/>
      <!-- speaker bar (top) -->
      <rect x="16" y="3"  width="16" height="3"  fill="#c09020"/>
      <rect x="18" y="3"  width="12" height="2"  fill="#f0c040"/>
      <!-- home button (bottom) -->
      <rect x="18" y="63" width="12" height="4"  fill="#c09020"/>
      <rect x="20" y="64" width="8"  height="2"  fill="#f0c040"/>
      <!-- pixel fireflies on screen (purple/white — match overlay) -->
      <rect x="14" y="20" width="4" height="4" fill="#c080ff"/>
      <rect x="26" y="28" width="4" height="4" fill="#ffffff"/>
      <rect x="18" y="38" width="4" height="4" fill="#e0b0ff"/>
      <rect x="30" y="22" width="2" height="2" fill="#ff80ff"/>
      <rect x="12" y="44" width="2" height="2" fill="#a050e8"/>
      <rect x="28" y="44" width="2" height="2" fill="#d0a0ff"/>
      <rect x="20" y="52" width="2" height="2" fill="#ffffff"/>
    </svg>
    <div class="rotate-msg">Переверни телефон</div>
  </div>
</div>

<!-- Loading overlay -->
<div id="loading-overlay" style="display:none">
  <div class="loading-inner">
    <svg id="loading-wheel" width="80" height="80" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;display:block;">
      <!-- outer rim -->
      <rect x="13" y="1" width="6" height="2" fill="#a07828"/>
      <rect x="13" y="29" width="6" height="2" fill="#a07828"/>
      <rect x="1" y="13" width="2" height="6" fill="#a07828"/>
      <rect x="29" y="13" width="2" height="6" fill="#a07828"/>
      <rect x="3" y="3" width="2" height="2" fill="#a07828" opacity="0.7"/>
      <rect x="27" y="3" width="2" height="2" fill="#a07828" opacity="0.7"/>
      <rect x="3" y="27" width="2" height="2" fill="#a07828" opacity="0.7"/>
      <rect x="27" y="27" width="2" height="2" fill="#a07828" opacity="0.7"/>
      <!-- cardinal spokes -->
      <rect x="15" y="3" width="2" height="11" fill="#f0c040"/>
      <rect x="15" y="18" width="2" height="11" fill="#f0c040"/>
      <rect x="3" y="15" width="11" height="2" fill="#f0c040"/>
      <rect x="18" y="15" width="11" height="2" fill="#f0c040"/>
      <!-- diagonal spokes (pixel-art stepped) -->
      <rect x="5" y="5" width="2" height="2" fill="#c09030"/>
      <rect x="8" y="8" width="2" height="2" fill="#c09030"/>
      <rect x="25" y="5" width="2" height="2" fill="#c09030"/>
      <rect x="22" y="8" width="2" height="2" fill="#c09030"/>
      <rect x="5" y="25" width="2" height="2" fill="#c09030"/>
      <rect x="8" y="22" width="2" height="2" fill="#c09030"/>
      <rect x="25" y="25" width="2" height="2" fill="#c09030"/>
      <rect x="22" y="22" width="2" height="2" fill="#c09030"/>
      <!-- hub -->
      <rect x="13" y="13" width="6" height="6" fill="#f0c040"/>
      <rect x="14" y="14" width="4" height="4" fill="#fffce8"/>
    </svg>
  </div>
</div>

<!-- Error overlay -->
<div id="error-overlay" style="display:none">
  <div class="error-msg"></div>
</div>

<!-- Hotbar (поверх всех сцен) -->
<div id="hotbar"></div>

<!-- Menu button + overlay -->
<button id="menu-btn" class="ui-btn" title="Меню"><svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated"><rect x="2" y="4" width="16" height="2" fill="currentColor"/><rect x="2" y="9" width="16" height="2" fill="currentColor"/><rect x="2" y="14" width="16" height="2" fill="currentColor"/></svg></button>
<div id="game-menu" style="display:none">
  <div class="game-menu-backdrop"></div>
  <div class="game-menu-panel">
    <button id="gm-sound">♪ Звук вкл</button>
    <button id="gm-ach">★ Достижения</button>
    <button id="gm-fs">⛶ Полный экран</button>
    <div class="game-menu-sep"></div>
    <button id="gm-reset">↺ Начать сначала</button>
  </div>
</div>

<!-- Game wrap — все сцены внутри -->
<div id="wrap">

  <!-- Main scene -->
  <canvas id="main-canvas"></canvas>
  <div id="main-msg" class="scene-msg"></div>
  <button id="pray-btn" class="pray-btn" title="Медитировать">มี</button>

</div>

<!-- Сцены создаются динамически из своих JS-модулей -->

<script type="module" src="game.js?v=1" defer></script>
</body>
</html>
