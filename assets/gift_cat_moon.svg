  <rect x="39" y="66" width="3" height="3" fill="#ffdc50"/>
  <rect x="54" y="66" width="3" height="3" fill="#ffdc50"/>
  <rect x="40" y="67" width="1" height="2" fill="#0a0812"/>
  <rect x="55" y="67" width="1" height="2" fill="#0a0812"/>
  <rect x="41" y="66" width="1" height="1" fill="#fffce8"/>
  <rect x="56" y="66" width="1" height="1" fill="#fffce8"/>

  <!-- Носик -->
  <rect x="47" y="69" width="2" height="1" fill="#ff80a0"/>

  <!-- Усы -->
  <rect x="32" y="68" width="4" height="1" fill="#fffce8" fill-opacity="0.6"/>
  <rect x="60" y="68" width="4" height="1" fill="#fffce8" fill-opacity="0.6"/>
  <rect x="32" y="70" width="4" height="1" fill="#fffce8" fill-opacity="0.4"/>
