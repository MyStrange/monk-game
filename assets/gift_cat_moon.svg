  <rect x="56" y="58" width="4" height="4" fill="#2a1f3a"/>
  <rect x="38" y="60" width="2" height="2" fill="#3a2a55"/>
  <rect x="56" y="60" width="2" height="2" fill="#3a2a55"/>

