  <rect x="0"  y="60" width="22" height="1" fill="#1a1428"/>
  <rect x="0"  y="61" width="28" height="1" fill="#1a1428"/>
  <rect x="20" y="56" width="6"  height="1" fill="#1a1428"/>
  <rect x="18" y="57" width="10" height="1" fill="#1a1428"/>
  <rect x="16" y="58" width="14" height="1" fill="#1a1428"/>
  <rect x="14" y="59" width="18" height="1" fill="#1a1428"/>

  <rect x="70" y="54" width="4"  height="1" fill="#1a1428"/>
  <rect x="68" y="55" width="8"  height="1" fill="#1a1428"/>
  <rect x="66" y="56" width="12" height="1" fill="#1a1428"/>
  <rect x="64" y="57" width="16" height="1" fill="#1a1428"/>
  <rect x="62" y="58" width="22" height="1" fill="#1a1428"/>
  <rect x="60" y="59" width="30" height="1" fill="#1a1428"/>
  <rect x="58" y="60" width="38" height="1" fill="#1a1428"/>
  <rect x="56" y="61" width="40" height="1" fill="#1a1428"/>

