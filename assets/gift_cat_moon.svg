  <rect x="34" y="72" width="28" height="10" fill="#2a1f3a"/>
  <rect x="32" y="74" width="32" height="8"  fill="#2a1f3a"/>

  <!-- Лапки передние -->
  <rect x="36" y="78" width="4" height="4" fill="#3a2a55"/>
  <rect x="56" y="78" width="4" height="4" fill="#3a2a55"/>
  <rect x="37" y="80" width="2" height="2" fill="#4a3a6a"/>
  <rect x="57" y="80" width="2" height="2" fill="#4a3a6a"/>

  <!-- Хвост, обвитый вокруг лап -->
  <rect x="62" y="76" width="4" height="2" fill="#2a1f3a"/>
  <rect x="64" y="74" width="4" height="2" fill="#2a1f3a"/>
  <rect x="66" y="72" width="4" height="2" fill="#2a1f3a"/>
  <rect x="68" y="74" width="2" height="4" fill="#2a1f3a"/>
  <rect x="66" y="76" width="2" height="2" fill="#3a2a55"/>

