<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 96" shape-rendering="crispEdges" style="image-rendering:pixelated;background:#0a0812">
  <!-- ─────────── Гигантская пиксельная банка со светлячком ─────────── -->

  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff9c0" stop-opacity="1"/>
      <stop offset="30%"  stop-color="#ffdc50" stop-opacity="0.85"/>
      <stop offset="60%"  stop-color="#ffaa20" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffaa20" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fffce8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fffce8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── Крышка банки ── -->
  <rect x="18" y="8"  width="28" height="2" fill="#806030"/>
  <rect x="16" y="10" width="32" height="4" fill="#a07828"/>
  <rect x="16" y="14" width="32" height="2" fill="#604818"/>
  <rect x="18" y="11" width="2"  height="2" fill="#c09030"/>
  <rect x="22" y="11" width="2"  height="2" fill="#c09030"/>
  <rect x="26" y="11" width="2"  height="2" fill="#c09030"/>
  <rect x="30" y="11" width="2"  height="2" fill="#c09030"/>
  <rect x="34" y="11" width="2"  height="2" fill="#c09030"/>
  <rect x="38" y="11" width="2"  height="2" fill="#c09030"/>
  <rect x="42" y="11" width="2"  height="2" fill="#c09030"/>

  <!-- ── Горловина ── -->
  <rect x="20" y="16" width="24" height="2" fill="#4a3a6a"/>
  <rect x="18" y="18" width="28" height="2" fill="#3a2a55"/>

  <!-- ── Корпус банки (стекло тёмно-фиолетовое) ── -->
  <rect x="14" y="20" width="36" height="64" fill="#1a1428" fill-opacity="0.85"/>
  <rect x="12" y="22" width="40" height="60" fill="#1a1428" fill-opacity="0.7"/>
  <rect x="12" y="82" width="40" height="2"  fill="#1a1428" fill-opacity="0.85"/>

  <!-- Дно -->
  <rect x="14" y="84" width="36" height="2" fill="#2a1f3a"/>
  <rect x="16" y="86" width="32" height="2" fill="#3a2a55"/>

  <!-- ── Блики на стекле ── -->
  <rect x="16" y="24" width="2" height="20" fill="#ffffff" fill-opacity="0.18"/>
  <rect x="18" y="24" width="2" height="12" fill="#ffffff" fill-opacity="0.10"/>
  <rect x="46" y="28" width="2" height="30" fill="#ffffff" fill-opacity="0.08"/>
  <rect x="16" y="70" width="2" height="8"  fill="#ffffff" fill-opacity="0.10"/>

  <!-- ── Мягкое свечение вокруг светлячка ── -->
  <circle cx="32" cy="50" r="22" fill="url(#glow)"/>
  <circle cx="32" cy="50" r="10" fill="url(#glow2)"/>

  <!-- ── Сам светлячок: пиксельное тельце ── -->
  <!-- Голова -->
  <rect x="30" y="44" width="4" height="2" fill="#3a2818"/>
  <rect x="29" y="46" width="6" height="2" fill="#3a2818"/>
  <!-- Глазки -->
  <rect x="30" y="46" width="1" height="1" fill="#fffce8"/>
  <rect x="33" y="46" width="1" height="1" fill="#fffce8"/>
  <!-- Грудка -->
  <rect x="28" y="48" width="8" height="2" fill="#4a2a10"/>
  <rect x="27" y="50" width="10" height="2" fill="#4a2a10"/>
  <!-- Светящееся брюшко -->
  <rect x="28" y="52" width="8" height="2" fill="#ffdc50"/>
  <rect x="27" y="54" width="10" height="2" fill="#fff080"/>
  <rect x="27" y="56" width="10" height="2" fill="#fffce8"/>
  <rect x="28" y="58" width="8" height="2" fill="#fff080"/>
  <rect x="29" y="60" width="6" height="2" fill="#ffdc50"/>
  <rect x="30" y="62" width="4" height="1" fill="#ffaa20"/>

  <!-- Крылышки (прозрачные) -->
  <rect x="22" y="48" width="6" height="2" fill="#e0d8ff" fill-opacity="0.35"/>
  <rect x="20" y="50" width="8" height="2" fill="#e0d8ff" fill-opacity="0.30"/>
  <rect x="22" y="52" width="6" height="2" fill="#e0d8ff" fill-opacity="0.25"/>
  <rect x="36" y="48" width="6" height="2" fill="#e0d8ff" fill-opacity="0.35"/>
  <rect x="36" y="50" width="8" height="2" fill="#e0d8ff" fill-opacity="0.30"/>
  <rect x="36" y="52" width="6" height="2" fill="#e0d8ff" fill-opacity="0.25"/>

  <!-- Усики -->
  <rect x="29" y="42" width="1" height="2" fill="#3a2818"/>
  <rect x="34" y="42" width="1" height="2" fill="#3a2818"/>
  <rect x="28" y="41" width="1" height="1" fill="#3a2818"/>
  <rect x="35" y="41" width="1" height="1" fill="#3a2818"/>

  <!-- ── Пылинки света, танцующие в банке ── -->
  <rect x="20" y="28" width="1" height="1" fill="#fff080" fill-opacity="0.8"/>
  <rect x="42" y="32" width="1" height="1" fill="#fff080" fill-opacity="0.7"/>
  <rect x="24" y="36" width="1" height="1" fill="#fffce8" fill-opacity="0.9"/>
  <rect x="40" y="40" width="1" height="1" fill="#ffdc50" fill-opacity="0.8"/>
  <rect x="18" y="44" width="1" height="1" fill="#fff080" fill-opacity="0.6"/>
  <rect x="44" y="48" width="1" height="1" fill="#fffce8" fill-opacity="0.7"/>
  <rect x="20" y="62" width="1" height="1" fill="#ffdc50" fill-opacity="0.8"/>
  <rect x="42" y="66" width="1" height="1" fill="#fff080" fill-opacity="0.7"/>
  <rect x="26" y="70" width="1" height="1" fill="#fffce8" fill-opacity="0.9"/>
  <rect x="38" y="74" width="1" height="1" fill="#ffdc50" fill-opacity="0.6"/>
  <rect x="22" y="78" width="1" height="1" fill="#fff080" fill-opacity="0.7"/>

  <!-- ── Отблеск света на дне ── -->
  <rect x="20" y="80" width="24" height="1" fill="#ffdc50" fill-opacity="0.25"/>
  <rect x="24" y="81" width="16" height="1" fill="#fff080" fill-opacity="0.35"/>
</svg>
