  <rect x="22" y="10" width="1" height="1" fill="#fffce8" fill-opacity="0.8"/>
  <rect x="30" y="6"  width="1" height="1" fill="#fffce8"/>
  <rect x="42" y="3"  width="1" height="1" fill="#fff080" fill-opacity="0.7"/>
  <rect x="58" y="8"  width="1" height="1" fill="#fffce8"/>
  <rect x="66" y="4"  width="1" height="1" fill="#fff080" fill-opacity="0.6"/>
  <rect x="80" y="10" width="1" height="1" fill="#fffce8" fill-opacity="0.9"/>
  <rect x="88" y="6"  width="1" height="1" fill="#fff080"/>
  <rect x="10" y="18" width="1" height="1" fill="#fffce8" fill-opacity="0.6"/>
  <rect x="26" y="22" width="1" height="1" fill="#fff080" fill-opacity="0.7"/>
