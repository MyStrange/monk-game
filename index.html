<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Монах и лес</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Единый хотбар поверх всех сцен -->
<div id="hotbar"></div>
<!-- Контекстное меню для предметов -->
<div id="item-menu"></div>

<div id="wrap">
  <img id="bg-img" src="assets/bg/main.png">
  <canvas id="game-canvas"></canvas>
  <canvas id="prayer-canvas"></canvas>
  <div id="msg-box"></div>

  <!-- Scene 2: tree / roots -->
  <div id="scene2">
    <img id="scene2-bg" src="assets/bg/tree.png">
    <canvas id="scene2-canvas"></canvas>
    <div id="scene2-msg"></div>
    <button id="scene2-back" onclick="closeScene2()">← Назад</button>
  </div>

  <!-- Buddha close-up -->
  <div id="buddha-screen">
    <img id="buddha-bg" src="assets/bg/buddha.jpeg">
    <canvas id="buddha-canvas"></canvas>
    <canvas id="wish-anim"></canvas>
    <div id="buddha-msg"></div>
    <button id="buddha-back" onclick="closeBuddha()">← Вернуться в лес</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
