<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Монах и лес</title>
<!-- PWA / iOS standalone -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Монах и лес">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0812">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icon.png">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' shape-rendering='crispEdges'><rect width='16' height='16' fill='%230a0812'/><rect x='6' y='1' width='4' height='1' fill='%23f0c040'/><rect x='4' y='2' width='8' height='1' fill='%23f0c040'/><rect x='3' y='3' width='10' height='1' fill='%23f0c040'/><rect x='2' y='4' width='12' height='1' fill='%23f0c040'/><rect x='2' y='5' width='12' height='1' fill='%23f0c040'/><rect x='1' y='6' width='14' height='4' fill='%23f0c040'/><rect x='2' y='10' width='12' height='1' fill='%23f0c040'/><rect x='2' y='11' width='12' height='1' fill='%23f0c040'/><rect x='3' y='12' width='10' height='1' fill='%23f0c040'/><rect x='4' y='13' width='8' height='1' fill='%23f0c040'/><rect x='6' y='14' width='4' height='1' fill='%23f0c040'/><rect x='7' y='1' width='2' height='14' fill='%23c09030'/><rect x='1' y='7' width='14' height='2' fill='%23c09030'/><rect x='3' y='3' width='2' height='2' fill='%23c09030'/><rect x='11' y='3' width='2' height='2' fill='%23c09030'/><rect x='3' y='11' width='2' height='2' fill='%23c09030'/><rect x='11' y='11' width='2' height='2' fill='%23c09030'/><rect x='6' y='6' width='4' height='4' fill='%23fffce8'/><rect x='7' y='7' width='2' height='2' fill='%23a07828'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=2">
<!-- Preload only main scene assets — остальные сцены грузятся при открытии -->
<link rel="preload" as="image" href="assets/bg/main.png">
<link rel="preload" as="image" href="assets/sprites/hero_right.png">
<link rel="preload" as="image" href="assets/sprites/hero_left.png">
<link rel="preload" as="image" href="assets/sprites/hero_sit.png">
<link rel="preload" as="image" href="assets/sprites/cat.png">
<link rel="preload" as="image" href="assets/sprites/monk_red.png">
</head>
<body>

<!-- Portrait rotate overlay (mobile only) -->
<div id="rotate-overlay">
  <canvas id="rotate-canvas"></canvas>
  <div class="rotate-content">
    <svg class="rotate-phone" width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
      <!-- ears -->
      <rect x="8"  y="4"  width="8"  height="8"  fill="#c09020"/>
      <rect x="10" y="6"  width="4"  height="4"  fill="#f0c040"/>
      <rect x="48" y="4"  width="8"  height="8"  fill="#c09020"/>
      <rect x="50" y="6"  width="4"  height="4"  fill="#f0c040"/>
      <!-- head -->
      <rect x="12" y="10" width="40" height="32" fill="#c09020"/>
      <rect x="8"  y="14" width="48" height="24" fill="#c09020"/>
      <!-- face — lighter muzzle -->
      <rect x="18" y="28" width="28" height="12" fill="#d4a830"/>
      <!-- eyes -->
      <rect x="18" y="18" width="8"  height="8"  fill="#f0c040"/>
      <rect x="38" y="18" width="8"  height="8"  fill="#f0c040"/>
      <rect x="20" y="20" width="4"  height="4"  fill="#0a0812"/>
      <rect x="40" y="20" width="4"  height="4"  fill="#0a0812"/>
      <!-- eye glint -->
      <rect x="23" y="20" width="1"  height="1"  fill="#ffffff"/>
      <rect x="43" y="20" width="1"  height="1"  fill="#ffffff"/>
      <!-- nose -->
      <rect x="29" y="30" width="6"  height="4"  fill="#d07010"/>
      <!-- mouth -->
      <rect x="26" y="34" width="4"  height="2"  fill="#a05010"/>
      <rect x="34" y="34" width="4"  height="2"  fill="#a05010"/>
      <!-- whiskers -->
      <rect x="4"  y="30" width="14" height="2"  fill="#f0e0a0"/>
      <rect x="46" y="30" width="14" height="2"  fill="#f0e0a0"/>
      <rect x="4"  y="34" width="12" height="2"  fill="#f0e0a0"/>
      <rect x="48" y="34" width="12" height="2"  fill="#f0e0a0"/>
      <!-- body -->
      <rect x="16" y="42" width="32" height="18" fill="#c09020"/>
      <rect x="12" y="44" width="40" height="14" fill="#c09020"/>
      <!-- paws -->
      <rect x="12" y="56" width="12" height="8"  fill="#c09020"/>
      <rect x="40" y="56" width="12" height="8"  fill="#c09020"/>
      <rect x="14" y="58" width="8"  height="4"  fill="#d4a830"/>
      <rect x="42" y="58" width="8"  height="4"  fill="#d4a830"/>
      <!-- tail -->
      <rect x="52" y="46" width="6"  height="4"  fill="#c09020"/>
      <rect x="56" y="50" width="6"  height="4"  fill="#c09020"/>
      <rect x="58" y="54" width="4"  height="4"  fill="#c09020"/>
    </svg>
    <div class="scene-msg-item visible">Переверни телефон</div>
  </div>
</div>

<!-- Loading overlay -->
<div id="loading-overlay" style="display:none">
  <div class="loading-inner">
    <svg id="loading-wheel" width="80" height="80" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;display:block;">
      <!-- outer rim -->
      <rect x="13" y="1" width="6" height="2" fill="#a07828"/>
      <rect x="13" y="29" width="6" height="2" fill="#a07828"/>
      <rect x="1" y="13" width="2" height="6" fill="#a07828"/>
      <rect x="29" y="13" width="2" height="6" fill="#a07828"/>
      <rect x="3" y="3" width="2" height="2" fill="#a07828" opacity="0.7"/>
      <rect x="27" y="3" width="2" height="2" fill="#a07828" opacity="0.7"/>
      <rect x="3" y="27" width="2" height="2" fill="#a07828" opacity="0.7"/>
      <rect x="27" y="27" width="2" height="2" fill="#a07828" opacity="0.7"/>
      <!-- cardinal spokes -->
      <rect x="15" y="3" width="2" height="11" fill="#f0c040"/>
      <rect x="15" y="18" width="2" height="11" fill="#f0c040"/>
      <rect x="3" y="15" width="11" height="2" fill="#f0c040"/>
      <rect x="18" y="15" width="11" height="2" fill="#f0c040"/>
      <!-- diagonal spokes (pixel-art stepped) -->
      <rect x="5" y="5" width="2" height="2" fill="#c09030"/>
      <rect x="8" y="8" width="2" height="2" fill="#c09030"/>
      <rect x="25" y="5" width="2" height="2" fill="#c09030"/>
      <rect x="22" y="8" width="2" height="2" fill="#c09030"/>
      <rect x="5" y="25" width="2" height="2" fill="#c09030"/>
      <rect x="8" y="22" width="2" height="2" fill="#c09030"/>
      <rect x="25" y="25" width="2" height="2" fill="#c09030"/>
      <rect x="22" y="22" width="2" height="2" fill="#c09030"/>
      <!-- hub -->
      <rect x="13" y="13" width="6" height="6" fill="#f0c040"/>
      <rect x="14" y="14" width="4" height="4" fill="#fffce8"/>
    </svg>
  </div>
</div>

<!-- Error overlay -->
<div id="error-overlay" style="display:none">
  <div class="error-msg"></div>
</div>

<!-- Hotbar (поверх всех сцен) -->
<div id="hotbar"></div>

<!-- Menu button + overlay -->
<button id="menu-btn" class="ui-btn" title="Меню"><svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated"><rect x="2" y="4" width="16" height="2" fill="currentColor"/><rect x="2" y="9" width="16" height="2" fill="currentColor"/><rect x="2" y="14" width="16" height="2" fill="currentColor"/></svg></button>
<div id="game-menu" style="display:none">
  <div class="game-menu-backdrop"></div>
  <div class="game-menu-panel">
    <button id="gm-sound">♪ Звук вкл</button>
    <button id="gm-ach">★ Достижения</button>
    <button id="gm-fs">⛶ Полный экран</button>
    <div class="game-menu-sep"></div>
    <button id="gm-reset">↺ Начать сначала</button>
  </div>
</div>

<!-- Game wrap — все сцены внутри -->
<div id="wrap">

  <!-- Main scene -->
  <canvas id="main-canvas"></canvas>
  <div id="main-msg" class="scene-msg"></div>
  <button id="pray-btn" class="pray-btn" title="Медитировать">มี</button>

</div>

<!-- Сцены создаются динамически из своих JS-модулей -->

<script type="module" src="game.js?v=13" defer></script>
</body>
</html>
