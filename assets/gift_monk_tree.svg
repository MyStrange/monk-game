<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" shape-rendering="crispEdges" style="image-rendering:pixelated;background:#0a0812">
  <!-- ─────────── Монах медитирует под деревом ─────────── -->

  <defs>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff080" stop-opacity="0.45"/>
      <stop offset="50%"  stop-color="#ffdc50" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffdc50" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── Звёзды ── -->
  <rect x="6"  y="6"  width="1" height="1" fill="#fffce8"/>
  <rect x="18" y="10" width="1" height="1" fill="#fff080" fill-opacity="0.7"/>
  <rect x="82" y="8"  width="1" height="1" fill="#fffce8"/>
  <rect x="90" y="14" width="1" height="1" fill="#fff080" fill-opacity="0.6"/>
  <rect x="74" y="4"  width="1" height="1" fill="#fffce8" fill-opacity="0.8"/>

  <!-- ── Земля ── -->
  <rect x="0" y="78" width="96" height="2"  fill="#2a1f3a"/>
  <rect x="0" y="80" width="96" height="16" fill="#1a1428"/>
  <rect x="0" y="82" width="96" height="1"  fill="#3a2a55" fill-opacity="0.5"/>

  <!-- ── Крона дерева (пышная, сакура-стайл, тёплые тона) ── -->
  <!-- Основная масса листвы -->
  <rect x="30" y="12" width="36" height="4"  fill="#4a2a40"/>
  <rect x="24" y="16" width="48" height="4"  fill="#4a2a40"/>
  <rect x="20" y="20" width="56" height="8"  fill="#4a2a40"/>
  <rect x="18" y="28" width="60" height="8"  fill="#4a2a40"/>
  <rect x="22" y="36" width="52" height="4"  fill="#4a2a40"/>
  <rect x="28" y="40" width="40" height="2"  fill="#4a2a40"/>

  <!-- Тёплые блики на листве (розово-оранжевые лепестки) -->
  <rect x="32" y="14" width="4"  height="2" fill="#a04060"/>
  <rect x="44" y="14" width="6"  height="2" fill="#a04060"/>
  <rect x="56" y="14" width="4"  height="2" fill="#a04060"/>
  <rect x="28" y="18" width="4"  height="2" fill="#c06080"/>
  <rect x="38" y="18" width="6"  height="2" fill="#a04060"/>
  <rect x="52" y="18" width="4"  height="2" fill="#c06080"/>
  <rect x="62" y="18" width="6"  height="2" fill="#a04060"/>
  <rect x="22" y="22" width="6"  height="2" fill="#a04060"/>
  <rect x="34" y="22" width="4"  height="2" fill="#c06080"/>
  <rect x="46" y="22" width="8"  height="2" fill="#a04060"/>
  <rect x="60" y="22" width="4"  height="2" fill="#c06080"/>
  <rect x="68" y="22" width="6"  height="2" fill="#a04060"/>
  <rect x="20" y="26" width="4"  height="2" fill="#c06080"/>
  <rect x="30" y="26" width="6"  height="2" fill="#a04060"/>
  <rect x="42" y="26" width="4"  height="2" fill="#ff80a0"/>
  <rect x="52" y="26" width="6"  height="2" fill="#a04060"/>
  <rect x="66" y="26" width="8"  height="2" fill="#c06080"/>
  <rect x="24" y="30" width="6"  height="2" fill="#a04060"/>
  <rect x="36" y="30" width="4"  height="2" fill="#c06080"/>
  <rect x="48" y="30" width="6"  height="2" fill="#a04060"/>
  <rect x="60" y="30" width="4"  height="2" fill="#ff80a0"/>
  <rect x="68" y="30" width="6"  height="2" fill="#a04060"/>
  <rect x="28" y="34" width="4"  height="2" fill="#c06080"/>
  <rect x="40" y="34" width="6"  height="2" fill="#a04060"/>
  <rect x="54" y="34" width="4"  height="2" fill="#c06080"/>
  <rect x="64" y="34" width="6"  height="2" fill="#a04060"/>

