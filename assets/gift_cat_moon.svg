  <rect x="4"  y="30" width="2" height="32" fill="#3a5028"/>
  <rect x="4"  y="34" width="2" height="1"  fill="#1a2818"/>
  <rect x="4"  y="44" width="2" height="1"  fill="#1a2818"/>
  <rect x="4"  y="54" width="2" height="1"  fill="#1a2818"/>
  <rect x="6"  y="36" width="3" height="1"  fill="#4a6028"/>
  <rect x="9"  y="35" width="2" height="1"  fill="#4a6028"/>
  <rect x="2"  y="42" width="2" height="1"  fill="#4a6028"/>
  <rect x="6"  y="48" width="4" height="1"  fill="#4a6028"/>

