  <rect x="62" y="14" width="12" height="2" fill="#fff080"/>
  <rect x="60" y="16" width="16" height="2" fill="#fff080"/>
  <rect x="58" y="18" width="18" height="2" fill="#fff080"/>
  <rect x="58" y="20" width="18" height="2" fill="#fff080"/>
  <rect x="58" y="22" width="18" height="2" fill="#fff080"/>
  <rect x="58" y="24" width="18" height="2" fill="#fff080"/>
  <rect x="60" y="26" width="16" height="2" fill="#fff080"/>
  <rect x="62" y="28" width="12" height="2" fill="#fff080"/>
  <!-- Тень полумесяца -->
  <rect x="64" y="16" width="12" height="2" fill="#0a0812"/>
  <rect x="66" y="18" width="12" height="2" fill="#0a0812"/>
  <rect x="66" y="20" width="14" height="2" fill="#0a0812"/>
